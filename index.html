<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Intellectual Sandbox — Neon Grid</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-void: #0a0a0f;
            --bg-card: #111119ee;
            --bg-card-alt: #14141f;
            --bg-panel: #0d0d18cc;
            --neon-cyan: #00f0ff;
            --neon-magenta: #ff00aa;
            --neon-yellow: #ffe600;
            --neon-purple: #b300ff;
            --neon-cyan-dim: #0088aa;
            --neon-magenta-dim: #aa0066;
            --text-bright: #e0e0ff;
            --text-muted: #99aacc;
            --text-subtle: #6677aa;
            --border-neon: rgba(0, 240, 255, 0.5);
            --border-neon2: rgba(255, 0, 170, 0.5);
            --shadow-neon: 0 0 15px rgba(0, 240, 255, 0.25), 0 0 30px rgba(0, 240, 255, 0.1);
            --shadow-neon-strong: 0 0 20px rgba(0, 240, 255, 0.5), 0 0 40px rgba(255, 0, 170, 0.3);
            --shadow-card: 0 4px 20px rgba(0,0,0,0.8), 0 0 15px rgba(0,240,255,0.1);
            --transition-ease: 0.3s cubic-bezier(0.25, 0.1, 0.25, 1);
            --transition-bounce: 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            --radius-card: 4px;
            --radius-sm: 2px;
            --header-font: 'Orbitron', sans-serif;
            --body-font: 'Rajdhani', sans-serif;
            --mono-font: 'Share Tech Mono', monospace;
            --sidebar-width: 280px;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html {
            scroll-behavior: smooth;
        }
        body {
            font-family: var(--body-font);
            background-color: var(--bg-void);
            color: var(--text-bright);
            line-height: 1.8;
            font-size: 1.15rem;
            font-weight: 400;
            letter-spacing: 0.02em;
            cursor: none;
            display: flex;
            min-height: 100vh;
            position: relative;
            background-attachment: fixed;
            background-image:
                linear-gradient(0deg, rgba(0,240,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,240,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            overflow-x: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.15) 2px, rgba(0,0,0,0.15) 4px);
            opacity: 0.4;
        }
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            background: radial-gradient(ellipse at 30% 30%, rgba(0,240,255,0.06) 0%, transparent 50%),
                        radial-gradient(ellipse at 70% 70%, rgba(255,0,170,0.04) 0%, transparent 50%);
        }

        .progress-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            z-index: 999;
            pointer-events: none;
            background: rgba(0,0,0,0.5);
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-magenta), var(--neon-yellow));
            box-shadow: 0 0 15px var(--neon-cyan), 0 0 30px var(--neon-magenta);
            width: 0%;
            transition: width 0.1s linear;
        }

        #custom-cursor {
            position: fixed;
            top: 0;
            left: 0;
            width: 22px;
            height: 22px;
            border: 2px solid var(--neon-cyan);
            background: rgba(0,240,255,0.05);
            border-radius: 2px;
            pointer-events: none;
            z-index: 9999;
            transition: width 0.2s, height 0.2s, background-color 0.2s, border-color 0.2s, box-shadow 0.2s;
            transform: translate(-50%, -50%) rotate(45deg);
            box-shadow: 0 0 12px var(--neon-cyan), inset 0 0 8px rgba(0,240,255,0.2);
        }
        #custom-cursor::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-45deg);
            width: 4px;
            height: 4px;
            background: var(--neon-magenta);
            border-radius: 0;
            box-shadow: 0 0 10px var(--neon-magenta), 0 0 20px var(--neon-magenta);
        }
        #custom-cursor.hover {
            width: 38px;
            height: 38px;
            background: rgba(255,0,170,0.15);
            border-color: var(--neon-magenta);
            box-shadow: 0 0 25px var(--neon-magenta), 0 0 45px var(--neon-cyan);
            border-radius: 3px;
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .particle {
            position: absolute;
            width: 2px;
            border-radius: 1px;
            opacity: 0;
            animation: digitalRain linear infinite;
            background: var(--neon-cyan);
            box-shadow: 0 0 6px var(--neon-cyan);
        }
        @keyframes digitalRain {
            0% { transform: translateY(-5vh) scaleY(1); opacity: 0; }
            10% { opacity: 0.8; }
            50% { opacity: 0.5; }
            90% { opacity: 0.1; }
            100% { transform: translateY(105vh) scaleY(0.3); opacity: 0; }
        }

        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: var(--sidebar-width);
            height: 100vh;
            background: rgba(10, 10, 18, 0.88);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-right: 1px solid var(--border-neon);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            padding: 3rem 1.5rem;
            box-shadow: 4px 0 25px rgba(0,0,0,0.7), 0 0 20px rgba(0,240,255,0.08);
            transition: transform 0.4s ease;
        }
        .sidebar.collapsed {
            transform: translateX(-100%);
        }
        .sidebar::after {
            content: '';
            position: absolute;
            top: 10%;
            right: 0;
            width: 1px;
            height: 80%;
            background: linear-gradient(180deg, transparent, var(--neon-cyan), var(--neon-magenta), var(--neon-cyan), transparent);
            opacity: 0.7;
        }
        .sidebar-toggle {
            position: absolute;
            right: -20px;
            top: 50%;
            transform: translateY(-50%);
            width: 36px;
            height: 36px;
            background: #0d0d18;
            border: 1px solid var(--border-neon);
            border-radius: 2px;
            cursor: pointer;
            z-index: 101;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--neon-cyan);
            font-size: 1rem;
            box-shadow: 0 0 10px rgba(0,240,255,0.2);
            transition: all 0.3s;
        }
        .sidebar-toggle:hover {
            background: rgba(0,240,255,0.1);
            border-color: var(--neon-magenta);
            color: var(--neon-magenta);
            box-shadow: 0 0 20px var(--neon-magenta);
        }
        .sidebar-logo {
            margin-bottom: 3.5rem;
            text-align: center;
        }
        .monogram {
            width: 82px;
            height: 82px;
            border: 2px solid var(--neon-cyan);
            background: rgba(0,240,255,0.04);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            font-family: var(--header-font);
            font-size: 2.8rem;
            color: var(--neon-cyan);
            font-weight: 800;
            letter-spacing: 0;
            box-shadow: 0 0 20px rgba(0,240,255,0.3), inset 0 0 15px rgba(0,240,255,0.1);
            animation: breathe 4s ease-in-out infinite;
            position: relative;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
        }
        .monogram::before {
            content: '';
            position: absolute;
            inset: -6px;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            border: 1px dashed rgba(255,0,170,0.4);
            animation: spin 20s linear infinite;
        }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes breathe {
            0%,100% { transform: scale(1); box-shadow: 0 0 20px rgba(0,240,255,0.3); }
            50% { transform: scale(1.05); box-shadow: 0 0 35px rgba(255,0,170,0.5), 0 0 50px rgba(0,240,255,0.4); }
        }
        .sidebar-logo h1 {
            font-family: var(--header-font);
            font-size: 1.3rem;
            color: var(--neon-cyan);
            font-weight: 600;
            letter-spacing: 0.1em;
            line-height: 1.3;
            text-shadow: 0 0 8px var(--neon-cyan);
        }
        .sidebar nav {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            width: 100%;
        }
        .sidebar nav a {
            text-decoration: none;
            color: var(--text-muted);
            font-family: var(--mono-font);
            font-weight: 500;
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 0.6rem 1.2rem;
            border-radius: 2px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 1rem;
            border: 1px solid transparent;
        }
        .sidebar nav a .dot {
            width: 7px;
            height: 7px;
            background: var(--neon-cyan-dim);
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
            transition: 0.3s;
        }
        .sidebar nav a:hover {
            color: var(--neon-cyan);
            background: rgba(0,240,255,0.05);
            border-color: var(--border-neon);
            text-shadow: 0 0 5px var(--neon-cyan);
        }
        .sidebar nav a.active {
            color: var(--neon-magenta);
            font-weight: 600;
            background: rgba(255,0,170,0.08);
            border-color: var(--border-neon2);
            box-shadow: inset 4px 0 0 var(--neon-magenta), 0 0 10px rgba(255,0,170,0.2);
            text-shadow: 0 0 8px var(--neon-magenta);
        }
        .sidebar nav a.active .dot {
            background: var(--neon-magenta);
            box-shadow: 0 0 12px var(--neon-magenta);
        }
        .sidebar-footer {
            margin-top: auto;
            font-size: 0.65rem;
            color: var(--text-subtle);
            letter-spacing: 1.8px;
            text-align: center;
            border-top: 1px solid rgba(0,240,255,0.15);
            padding-top: 2rem;
            width: 100%;
        }
        .glitch-icon {
            margin: 1rem auto 0;
            font-size: 1.3rem;
            color: var(--neon-cyan);
            animation: glitch 2.5s infinite;
            display: inline-block;
        }
        @keyframes glitch {
            0%, 100% { transform: translate(0); opacity: 0.9; text-shadow: 2px 0 var(--neon-magenta), -2px 0 var(--neon-cyan); }
            20% { transform: translate(-2px, 1px); opacity: 1; text-shadow: -2px 0 var(--neon-magenta), 2px 0 var(--neon-cyan); }
            40% { transform: translate(2px, -1px); text-shadow: 3px 0 var(--neon-magenta), -3px 0 var(--neon-cyan); }
            60% { transform: translate(-1px, 0); text-shadow: -1px 0 var(--neon-magenta), 1px 0 var(--neon-cyan); }
            80% { transform: translate(1px, 1px); }
        }

        .mobile-toggle {
            display: none;
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 200;
            font-size: 1.6rem;
            color: var(--neon-cyan);
            background: rgba(10,10,18,0.9);
            border: 1px solid var(--border-neon);
            border-radius: 4px;
            padding: 0.3rem 0.8rem;
            cursor: pointer;
            backdrop-filter: blur(10px);
            text-shadow: 0 0 8px var(--neon-cyan);
        }

        .main-content {
            margin-left: var(--sidebar-width);
            flex: 1;
            padding: 4rem 4rem 3rem;
            position: relative;
            z-index: 5;
            transition: margin-left 0.4s ease;
            border-left: 30px solid transparent;
        }
        .main-content.expanded {
            margin-left: 0;
        }
        .main-content::before {
            content: '';
            position: fixed;
            top: 0;
            left: calc(var(--sidebar-width) - 15px);
            height: 100%;
            width: 30px;
            background: repeating-linear-gradient(0deg, var(--neon-cyan-dim) 0px, var(--neon-cyan-dim) 2px, transparent 2px, transparent 8px);
            opacity: 0.2;
            z-index: 0;
            pointer-events: none;
            transition: left 0.4s ease;
        }
        .main-content.expanded::before {
            left: -15px;
        }

        .page {
            display: none;
            animation: fadeInPage 0.5s ease forwards;
        }
        .page.active {
            display: block;
        }
        @keyframes fadeInPage {
            from { opacity: 0; transform: translateY(18px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            font-family: var(--header-font);
            font-size: 2.8rem;
            color: var(--neon-cyan);
            font-weight: 700;
            margin-bottom: 0.5rem;
            letter-spacing: 0.06em;
            display: inline-block;
            text-shadow: 0 0 15px var(--neon-cyan), 0 0 30px var(--neon-cyan);
            position: relative;
        }
        h2::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-magenta), transparent);
            box-shadow: 0 0 10px var(--neon-cyan);
        }
        .section-underline {
            width: 80px;
            height: 3px;
            background: linear-gradient(90deg, var(--neon-magenta), var(--neon-cyan));
            margin-bottom: 2rem;
            border-radius: 1px;
            box-shadow: 0 0 15px var(--neon-magenta);
        }
        .section-intro {
            color: var(--text-muted);
            font-style: italic;
            font-size: 1.1rem;
            margin-bottom: 2.5rem;
            padding-left: 1.5rem;
            border-left: 3px solid var(--border-neon2);
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 2rem;
        }
        .card {
            background: var(--bg-card);
            border: 1px solid rgba(0,240,255,0.15);
            border-radius: var(--radius-card);
            padding: 2.5rem;
            transition: all var(--transition-bounce);
            box-shadow: var(--shadow-card);
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(5px);
        }
        .card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(0,240,255,0.05) 0%, rgba(255,0,170,0.05) 100%);
            opacity: 0;
            transition: 0.5s;
            border-radius: inherit;
            pointer-events: none;
        }
        .card:hover {
            border-color: var(--border-neon);
            box-shadow: var(--shadow-neon-strong), 0 0 30px rgba(0,240,255,0.2);
            transform: translateY(-5px);
        }
        .card:hover::before {
            opacity: 1;
        }
        .card h3 {
            font-family: var(--header-font);
            font-size: 1.6rem;
            color: var(--neon-cyan);
            font-weight: 600;
            margin-bottom: 0.8rem;
            text-shadow: 0 0 8px rgba(0,240,255,0.4);
        }
        .date {
            font-family: var(--mono-font);
            font-size: 0.7rem;
            color: var(--neon-magenta);
            text-transform: uppercase;
            letter-spacing: 3px;
            display: block;
            margin-bottom: 1rem;
            font-weight: 500;
            text-shadow: 0 0 6px var(--neon-magenta);
        }
        .bio-box {
            background: var(--bg-card-alt);
            border: 1px solid rgba(0,240,255,0.2);
            border-left: 6px solid var(--neon-cyan);
            border-radius: 0 var(--radius-card) var(--radius-card) 0;
            padding: 2.8rem;
            display: flex;
            gap: 2.5rem;
            align-items: flex-start;
            box-shadow: 0 0 20px rgba(0,240,255,0.1);
            position: relative;
            overflow: hidden;
        }
        .bio-box::after {
            content: '';
            position: absolute;
            top: 0;
            left: -6px;
            width: 6px;
            height: 100%;
            background: linear-gradient(180deg, var(--neon-cyan), var(--neon-magenta), var(--neon-cyan));
            opacity: 0.8;
            box-shadow: 0 0 15px var(--neon-cyan);
        }
        .bio-icon {
            font-size: 2.8rem;
            color: var(--neon-cyan);
            text-shadow: 0 0 15px var(--neon-cyan);
        }
        .read-more {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 1.5rem;
            color: var(--neon-cyan);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.78rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-family: var(--mono-font);
            transition: 0.3s;
            border-bottom: 1px solid transparent;
            padding-bottom: 2px;
            position: relative;
            overflow: hidden;
        }
        .read-more::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 1px;
            background: var(--neon-magenta);
            transform: translateX(-101%);
            transition: 0.4s;
        }
        .read-more:hover::after {
            transform: translateX(0);
        }
        .read-more:hover {
            color: var(--neon-magenta);
            text-shadow: 0 0 8px var(--neon-magenta);
        }

        .manifesto {
            background: rgba(20,20,30,0.7);
            border: 1px solid rgba(255,0,170,0.2);
            padding: 2.5rem;
            margin-top: 3rem;
            border-radius: var(--radius-card);
            box-shadow: 0 0 0 15 15px rgbapx rgba(255(255,0,0,170,170,0,0.1.1);
